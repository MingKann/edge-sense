name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (OpenCV)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest opencv-python numpy requests pytesseract

      - name: Run tests (logic only, no hardware)
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_motion.py \
            -k "not camera and not hardware"
