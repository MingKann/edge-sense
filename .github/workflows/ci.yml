name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── 单元测试 ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (OpenCV)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest opencv-python numpy requests pytesseract

      - name: Run tests (logic only, no hardware)
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_motion.py \
            --ignore=tests/test_benchmark.py \
            -k "not camera and not hardware"

  # ─── 性能基准测试 ─────────────────────────────────
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (OpenCV)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark opencv-python numpy requests pytesseract

      - name: Run benchmarks
        run: |
          python -m pytest tests/test_benchmark.py -v --benchmark-only \
            --benchmark-json=.benchmark_results.json

      - name: Generate benchmark report
        run: |
          python -c "
import json, os

with open('.benchmark_results.json') as f:
    data = json.load(f)

rows = []
for b in data.get('benchmarks', []):
    name = b['name'].replace('test_bench_', '').replace('_', ' ')
    mean_us = b['stats']['mean'] * 1e6  # seconds → microseconds
    rows.append((mean_us, name, b['stats']))

rows.sort()

print('## 性能基准报告')
print()
print('| 操作 | 平均耗时 | 最小值 | 最大值 | 样本数 |')
print('|---|---|---|---|---|')
for mean_us, name, stats in rows:
    print(f'| {name} | {mean_us:.2f} µs | {stats[\"min\"]*1e6:.2f} µs | {stats[\"max\"]*1e6:.2f} µs | {stats[\"rounds\"]} |')
print()
print(f'*生成时间: {data[\"datetime\"]}*')
" > .benchmark_report.md

          cat .benchmark_report.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            .benchmark_results.json
            .benchmark_report.md
