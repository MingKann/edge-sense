# Vantage 配置文件
# 阶段3：推理引擎

camera:
  index: 0
  width: 640
  height: 480

# ── Ollama推理 ──
inference:
  model: vantage
  base_url: http://localhost:11434
  cold_timeout: 300       # 首次加载2GB到显存
  hot_timeout: 120        # 模型已在显存中的推理

# ── 阶段3：推理引擎 ──
stage3:
  inference_interval: 30  # 每N帧调用一次LLM（30fps下≈1次/秒）
  warmup_frames: 158      # MOG2(30) + FFT(128)，必须先于首次推理
  temperature: 0.2        # 低温度稳定JSON输出
  json_mode: true         # Ollama API format:"json" + System Prompt双重约束
  # 自适应推理频率（根据运动等级动态调整）
  adaptive:
    none: 60              # 静止时每60帧推理一次（省资源）
    low: 30               # 轻微运动时正常频率
    medium: 15            # 中等运动时提高频率
    high: 15              # 高强度运动时最高频率
    hysteresis: 3         # 连续N帧同等级后才切换（防振荡）

# ── 预处理管线 ──
preprocess:
  color:
    k_colors: 5
    sample_step: 4

  motion:
    history: 100
    var_threshold: 36
    warmup_frames: 30
    low_threshold: 0.005
    medium_threshold: 0.03
    high_threshold: 0.10
    min_area: 200

  flicker:
    buffer_size: 128
    fps: 30.0
    led_threshold: 180
    led_min_area: 4
    led_max_area: 400
    roi_size: 24

  ocr:
    enabled: true
    interval: 10
    psm: 7
    whitelist: "0123456789.-:AVWHzFkMmμ°CΩ"

# ── Webhook 告警通知 ──
webhook:
  enabled: false           # true 启用后，诊断出告警时发送 HTTP POST
  on_status: ["alert"]     # 触发级别：["alert"] 或 ["alert", "warning"]
  timeout: 5               # 请求超时秒数
  retries: 2               # 失败重试次数（指数退避）
  urls:                    # 多目标支持
    - url: "https://hooks.example.com/vantage"
      headers: {}
